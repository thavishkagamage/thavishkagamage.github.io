<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="16" font-weight="500" fill="#1a1a1a">Multi-agent LLM healthcare decision game</text>
  <text x="340" y="50" text-anchor="middle" font-size="12" fill="#666">Five-step flow: decide, optimize, debate, revise, evaluate</text>

  <!-- Step 1: Decide -->
  <rect x="40" y="75" width="108" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="94" y="97" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">1. Decide</text>
  <text x="94" y="115" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Allocate resources</text>

  <!-- Arrow 1->2 -->
  <line x1="148" y1="103" x2="168" y2="103" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Optimal -->
  <rect x="170" y="75" width="108" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="224" y="97" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">2. Optimal</text>
  <text x="224" y="115" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Compare to solver</text>

  <!-- Arrow 2->3 -->
  <line x1="278" y1="103" x2="298" y2="103" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Debate -->
  <rect x="300" y="75" width="108" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="354" y="97" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">3. Debate</text>
  <text x="354" y="115" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">AI agents discuss</text>

  <!-- Arrow 3->4 -->
  <line x1="408" y1="103" x2="428" y2="103" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Revise -->
  <rect x="430" y="75" width="108" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="484" y="97" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">4. Revise</text>
  <text x="484" y="115" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Adjust allocation</text>

  <!-- Arrow 4->5 -->
  <line x1="538" y1="103" x2="558" y2="103" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Evaluate -->
  <rect x="560" y="75" width="108" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="614" y="97" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">5. Evaluate</text>
  <text x="614" y="115" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">Stress test</text>

  <!-- Divider -->
  <line x1="40" y1="155" x2="640" y2="155" stroke="#ccc" stroke-width="0.5"/>

  <!-- Agents section title -->
  <text x="340" y="180" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">Structured multi-agent debate</text>

  <!-- Optimistic Agent -->
  <rect x="40" y="200" width="185" height="130" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="132" y="225" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Optimistic agent</text>
  <text x="132" y="248" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Cost-minimizing</text>
  <text x="132" y="268" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Expected demand</text>
  <text x="132" y="295" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">M:8 · A:11 · N:4</text>
  <text x="132" y="315" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">23 nurses · $11,500</text>

  <!-- Pessimistic Agent -->
  <rect x="248" y="200" width="185" height="130" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="225" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Pessimistic agent</text>
  <text x="340" y="248" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Safety-maximizing</text>
  <text x="340" y="268" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">90th percentile demand</text>
  <text x="340" y="295" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">M:11 · A:14 · N:6</text>
  <text x="340" y="315" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">31 nurses · $15,500</text>

  <!-- Mediator Agent -->
  <rect x="456" y="200" width="185" height="130" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="548" y="225" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Mediator agent</text>
  <text x="548" y="248" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Balanced approach</text>
  <text x="548" y="268" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">75th percentile demand</text>
  <text x="548" y="295" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">M:9 · A:14 · N:6</text>
  <text x="548" y="315" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">29 nurses · $14,500</text>

  <!-- Arrows to synthesis -->
  <line x1="132" y1="330" x2="300" y2="375" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="330" x2="340" y2="370" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="548" y1="330" x2="380" y2="375" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Synthesis box -->
  <rect x="240" y="370" width="200" height="40" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="394" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Final synthesis</text>
</svg>
